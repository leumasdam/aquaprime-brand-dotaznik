<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AQUAPRIME / Brand Discovery</title>
<meta name="description" content="Dotazník pred tvorbou loga a značky AQUAPRIME — pomôže nastaviť smer, osobnosť a vizuál." />
<link rel="icon" type="image/svg+xml" href="assets/brand/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* =========================================================
   ZENKO.SK design jazyk (zdroj: portfolio-v2 = live zenko.sk)
   biela + zinc, Outfit, veľké zaoblené karty, čierne pill CTA,
   zeleno-teal akcenty (#0c4b3a / #8dc63f / #20827c).
   ========================================================= */
:root{
  --bg-page:#ffffff;
  --bg-card:#f4f4f5;
  --bg-sunken:#e4e4e7;
  --bg-hover:#f7f7f8;
  --ink:#18181b;
  --ink-strong:#27272a;
  --ink-soft:#3f3f46;
  --ink-muted:#71717a;
  --ink-faint:#a1a1aa;
  --border:rgba(24,24,27,.08);
  --border-strong:rgba(24,24,27,.14);

  --green-dark:#0c4b3a;   /* accent text / linky / eyebrowy */
  --green:#8dc63f;        /* lime highlight: dots, checky, progress */
  --green-light:#eaf3de;
  --teal:#20827c;         /* interactive / focus */
  --teal-50:#ebf5f3;
  --teal-100:#d2e8e5;

  --font-body:"Outfit",system-ui,sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,monospace;

  --r-card:24px;
  --r-control:12px;
  --r-pill:9999px;

  --shadow-card:0 1px 3px rgba(24,24,27,.04);
  --shadow-hover:0 8px 24px rgba(24,24,27,.08);

  --ease:cubic-bezier(.32,.72,.2,1);
  --dur:.3s;
  --maxw:760px;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0; min-height:100dvh;
  background:var(--bg-page); color:var(--ink);
  font-family:var(--font-body); line-height:1.55;
  -webkit-font-smoothing:antialiased;
  display:flex; flex-direction:column;
}
button{font:inherit;}
a{color:inherit;}

/* ===== Header ===== */
.header{
  position:sticky; top:0; z-index:30;
  background:color-mix(in srgb,var(--bg-page) 82%,transparent);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
.header__inner{
  max-width:var(--maxw); margin-inline:auto;
  padding:16px clamp(20px,5vw,40px);
  display:flex; align-items:center; justify-content:space-between; gap:16px;
}
.brand{font-size:21px; font-weight:700; letter-spacing:-.02em; text-decoration:none;}
.brand .slash{color:var(--green); font-weight:700; margin:0 1px;}
.header__tag{
  font-family:var(--font-mono); font-size:11px; letter-spacing:.14em;
  text-transform:uppercase; color:var(--green-dark);
  display:inline-flex; align-items:center; gap:8px;
}
.header__tag::before{content:""; width:7px; height:7px; border-radius:50%; background:var(--green);}

/* ===== Layout ===== */
main{
  flex:1; width:100%; max-width:var(--maxw);
  margin-inline:auto; padding:clamp(24px,5vw,56px) clamp(20px,5vw,40px) 80px;
  display:flex; flex-direction:column;
}

/* ===== Progress ===== */
.progress{margin-bottom:clamp(28px,5vw,48px);}
.progress__meta{
  display:flex; justify-content:space-between; align-items:baseline;
  font-family:var(--font-mono); font-size:11px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--ink-muted); margin-bottom:10px;
}
.progress__meta b{color:var(--green-dark); font-weight:600;}
.progress__bar{height:4px; background:var(--bg-sunken); border-radius:var(--r-pill); overflow:hidden;}
.progress__fill{height:100%; width:0; border-radius:var(--r-pill);
  background:linear-gradient(90deg,var(--teal),var(--green));
  transition:width .45s var(--ease);}
.progress.is-hidden{visibility:hidden;}

/* ===== Step ===== */
.step{display:flex; flex-direction:column;}
.step__eyebrow{
  font-family:var(--font-mono); font-size:12px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--green-dark); margin-bottom:14px;
  display:inline-flex; align-items:center; gap:10px;
}
.step__eyebrow::before{content:""; width:18px; height:2px; background:var(--green); border-radius:2px;}
.step__title{
  font-size:clamp(28px,4.6vw,44px); font-weight:600; letter-spacing:-.02em;
  line-height:1.12; margin:0 0 12px;
}
.step__help{color:var(--ink-muted); font-size:16px; margin:0 0 30px; max-width:60ch;}

/* anim prechod */
.fade-enter{animation:fadeIn .42s var(--ease) both;}
@keyframes fadeIn{from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;}}
@media (prefers-reduced-motion:reduce){.fade-enter{animation:none;}}

/* ===== Intro ===== */
.intro__hero{
  font-size:clamp(46px,10vw,92px); font-weight:700; letter-spacing:-.04em; line-height:.95; margin:0 0 10px;
  background:linear-gradient(90deg,var(--green-dark) 0%,var(--green-dark) 16%,var(--teal) 40%,var(--green) 52%,var(--teal) 66%,var(--green-dark) 88%,var(--green-dark) 100%);
  background-size:200% 100%; -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; animation:gradient-shift 7s ease-in-out infinite;
}
@keyframes gradient-shift{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
.intro__hero .slash{-webkit-text-fill-color:initial; color:var(--green);}
.intro__sub{font-family:var(--font-mono); font-size:13px; letter-spacing:.16em; text-transform:uppercase; color:var(--green-dark); margin:0 0 26px;}
.intro__lead{font-size:19px; color:var(--ink-soft); max-width:54ch; margin:0 0 14px;}
.intro__facts{list-style:none; padding:0; margin:26px 0 38px; display:flex; flex-wrap:wrap; gap:12px;}
.intro__facts li{display:inline-flex; align-items:center; gap:8px; font-size:14px; color:var(--ink-soft);
  border:1px solid var(--border); background:var(--bg-card); border-radius:var(--r-pill); padding:9px 16px; box-shadow:var(--shadow-card);}
.intro__facts b{color:var(--green-dark); font-family:var(--font-mono); font-size:13px;}

/* ===== Inputy ===== */
.field input[type=text], .field textarea{
  width:100%; font:inherit; font-size:17px; color:var(--ink);
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-control);
  padding:16px 18px; outline:none; transition:border-color .2s, box-shadow .2s, background .2s; resize:vertical;
}
.field textarea{min-height:150px; line-height:1.6;}
.field input:focus, .field textarea:focus{
  border-color:var(--teal); background:var(--bg-page);
  box-shadow:0 0 0 4px var(--teal-50);
}
.field input::placeholder, .field textarea::placeholder{color:var(--ink-faint);}
.field--row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
@media (max-width:520px){.field--row{grid-template-columns:1fr;}}

/* ===== Choice cards (single) ===== */
.choices{display:grid; gap:12px;}
.choice{
  text-align:left; cursor:pointer; background:var(--bg-card);
  border:1.5px solid var(--border); border-radius:var(--r-card);
  padding:20px 22px; display:flex; gap:16px; align-items:flex-start;
  transition:transform var(--dur) var(--ease), border-color .2s, box-shadow var(--dur), background .2s;
}
.choice:hover{transform:translateY(-3px); box-shadow:var(--shadow-hover); background:var(--bg-hover);}
.choice.is-selected{border-color:var(--green); background:var(--green-light);}
.choice__mark{
  flex:none; width:24px; height:24px; border-radius:50%; border:2px solid var(--border-strong);
  display:grid; place-items:center; margin-top:1px; transition:.2s; color:#fff; font-size:13px; font-weight:700;
}
.choice.is-selected .choice__mark{border-color:var(--green); background:var(--green);}
.choice__mark::after{content:"✓"; opacity:0; transition:.2s;}
.choice.is-selected .choice__mark::after{opacity:1;}
.choice__body{flex:1;}
.choice__label{font-size:17px; font-weight:600; letter-spacing:-.01em;}
.choice__desc{font-size:14px; color:var(--ink-muted); margin-top:4px;}
.choice__num{font-family:var(--font-mono); font-size:12px; color:var(--green-dark); margin-right:8px;}
.choice--multi .choice__mark{border-radius:7px;}

/* chips (multi kompaktné) — aktívny = čierna pill (zenko .pill.is-active) */
.chips{display:flex; flex-wrap:wrap; gap:10px;}
.chip{
  cursor:pointer; background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--r-pill); padding:11px 18px; font-size:15px; color:var(--ink-muted);
  font-weight:500; transition:.2s var(--ease); display:inline-flex; align-items:center; gap:8px;
}
.chip:hover{color:var(--ink); background:var(--bg-hover); border-color:var(--border-strong);}
.chip.is-selected{background:var(--ink); border-color:var(--ink); color:#fff; font-weight:600;}
.chip__tick{color:var(--green); font-weight:700; opacity:0; width:0; transition:.2s; overflow:hidden;}
.chip.is-selected .chip__tick{opacity:1; width:14px;}

.other-field{margin-top:14px; display:none;}
.other-field.is-shown{display:block;}

/* ===== Scale ===== */
.scale__ends{display:flex; justify-content:space-between; gap:16px; margin-bottom:14px;}
.scale__end{font-size:16px; font-weight:600;}
.scale__end--right{text-align:right; color:var(--ink-soft);}
.scale__track{position:relative; padding:6px 0 2px;}
.scale__range{
  -webkit-appearance:none; appearance:none; width:100%; height:4px;
  background:var(--bg-sunken); border-radius:var(--r-pill); outline:none; cursor:pointer;
}
.scale__range::-webkit-slider-thumb{
  -webkit-appearance:none; appearance:none; width:28px; height:28px; border-radius:50%;
  background:var(--teal); border:5px solid var(--bg-page); box-shadow:var(--shadow-hover); cursor:grab;
}
.scale__range::-moz-range-thumb{
  width:28px; height:28px; border-radius:50%; background:var(--teal);
  border:5px solid var(--bg-page); box-shadow:var(--shadow-hover); cursor:grab;
}
.scale__ticks{display:flex; justify-content:space-between; margin-top:12px;}
.scale__ticks span{font-family:var(--font-mono); font-size:11px; color:var(--ink-faint);}
.scale__value{font-family:var(--font-mono); font-size:12px; color:var(--green-dark); text-align:center; margin-top:12px; letter-spacing:.08em; text-transform:uppercase;}

/* ===== Navigácia ===== */
.nav{display:flex; align-items:center; gap:14px; margin-top:38px; flex-wrap:wrap;}
.btn{
  display:inline-flex; align-items:center; gap:10px; cursor:pointer;
  font-size:15px; font-weight:700; letter-spacing:.01em;
  text-decoration:none; padding:15px 30px; border-radius:var(--r-pill); border:1.5px solid transparent;
  transition:transform var(--dur) var(--ease), box-shadow var(--dur), background .2s, color .2s, border-color .2s;
}
/* primárne CTA = čierna pill (zenko .allprojects-btn) */
.btn--gold{background:var(--ink); color:#fff;}
.btn--gold:hover{transform:translateY(-2px); box-shadow:var(--shadow-hover);}
.btn--gold:disabled{opacity:.4; cursor:not-allowed; transform:none; box-shadow:none;}
.btn--ghost{color:var(--ink-muted); padding-inline:8px;}
.btn--ghost:hover{color:var(--green-dark);}
.btn--outline{color:var(--ink); border-color:var(--border-strong); background:var(--bg-page);}
.btn--outline:hover{border-color:var(--ink);}
.nav__hint{font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); margin-left:auto; letter-spacing:.06em;}
@media (max-width:520px){.nav__hint{display:none;}}

/* ===== Summary ===== */
.summary__group{margin:0 0 26px;}
.summary__qlabel{font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--green-dark); margin-bottom:6px;}
.summary__q{font-size:14px; color:var(--ink-muted); margin-bottom:4px;}
.summary__a{font-size:17px; font-weight:600; letter-spacing:-.01em; white-space:pre-wrap;}
.summary__a.is-empty{color:var(--ink-faint); font-weight:400; font-style:italic;}
.summary__divider{height:1px; background:var(--border); margin:0 0 26px;}
.actions{display:flex; flex-wrap:wrap; gap:12px; margin-top:34px;}
.toast{
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:#fff; padding:13px 24px; border-radius:var(--r-pill);
  font-size:14px; font-weight:500; opacity:0; pointer-events:none; transition:.3s var(--ease); z-index:60;
  box-shadow:var(--shadow-hover);
}
.toast.is-shown{opacity:1; transform:translateX(-50%) translateY(0);}

.page-footer{
  border-top:1px solid var(--border); padding:22px clamp(20px,5vw,40px);
  font-size:12px; color:var(--ink-faint); text-align:center;
}
.page-footer .slash{color:var(--green);}

/* ===== Zenko logo v hlavičke (port z portfolio-v2) ===== */
.header__left{display:flex; align-items:center; gap:13px; text-decoration:none;}
.header__brandimg{width:34px; height:41px; display:block; transition:transform var(--dur) var(--ease);}
.header__left:hover .header__brandimg{transform:rotate(-6deg) scale(1.06);}
.header__identity{display:flex; flex-direction:column; gap:1px;}
.header__name{font-size:21px; font-weight:600; line-height:1.1; letter-spacing:-.01em; display:inline-flex; align-items:center; gap:7px;}
.header__slash{height:.92em; width:auto; display:block; flex:none;}
.header__meta{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:var(--ink-muted);}
.header__meta::before{content:""; width:6px; height:6px; border-radius:50%; background:var(--green);}
@media (max-width:560px){.header__identity{display:none;}}

/* ===== Konštrukčný grid v pozadí (odkrýva sa okolo kurzora) ===== */
.zen-bg{position:fixed; inset:0; z-index:-2; pointer-events:none; overflow:hidden;}
.zen-gridglow{position:absolute; inset:0;
  background:radial-gradient(circle 460px at var(--gx,-800px) var(--gy,-800px),
    rgba(32,130,124,.10), rgba(141,198,63,.05) 45%, transparent 70%);}
.zen-grid{position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(24,24,27,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(24,24,27,.06) 1px, transparent 1px);
  background-size:64px 64px;
  -webkit-mask:
    radial-gradient(circle 540px at var(--gx,-800px) var(--gy,-800px), transparent 0 200px, #000 540px),
    radial-gradient(130% 100% at 55% 18%, #000 42%, transparent 100%);
  -webkit-mask-composite:source-in;
  mask:
    radial-gradient(circle 540px at var(--gx,-800px) var(--gy,-800px), transparent 0 200px, #000 540px),
    radial-gradient(130% 100% at 55% 18%, #000 42%, transparent 100%);
  mask-composite:intersect;}
@media (max-width:720px){.zen-bg{display:none;}}

/* ===== Živý maskot (port z zen.css) ===== */
.hero--zen{display:grid; grid-template-columns:1.18fr .82fr; align-items:center; gap:clamp(16px,4vw,48px);}
.hero__copy{display:flex; flex-direction:column;}
.zen-mascot{display:flex; justify-content:center; align-items:center;}
.zen-mascot__inner{position:relative; width:clamp(170px,22vw,290px); aspect-ratio:337.82/406.94; cursor:pointer;}
.zen-mascot__face{width:100%; height:100%; display:block;}
.zen-eye{position:absolute; width:27.8%; aspect-ratio:1; transform:translate(-50%,-50%);}
.zen-eye--l{left:27.9%; top:59.9%;}
.zen-eye--r{left:72.1%; top:59.9%;}
.zen-eye i{position:absolute; left:50%; top:50%; width:34%; aspect-ratio:1; border-radius:50%; background:var(--ink);
  transform:translate(-50%,-50%) translate(var(--ex,0px),var(--ey,0px)); transition:transform .12s ease-out, width .2s ease;}
.zen-mascot.is-curious .zen-eye i{width:46%;}
.zen-mascot.is-blink .zen-eye i{transform:translate(-50%,-50%) translate(var(--ex,0px),var(--ey,0px)) scaleY(.08);}
.zen-stache{position:absolute; left:20.9%; top:75.3%; width:58.2%; height:auto; transform-origin:50% 35%;}
@keyframes stacheWiggle{0%,100%{transform:rotate(0) scaleX(1);}20%{transform:rotate(-2.4deg) scaleX(1.04);}45%{transform:rotate(1.4deg) scaleX(.99);}70%{transform:rotate(2.4deg) scaleX(1.04);}}
.zen-mascot.is-stache .zen-stache{animation:stacheWiggle 1s ease-in-out;}
.zen-twinkle{position:absolute; left:70%; top:70%; width:11%; aspect-ratio:1; background:var(--green);
  clip-path:polygon(50% 0,59% 41%,100% 50%,59% 59%,50% 100%,41% 59%,0 50%,41% 41%); opacity:0; transform:scale(.3); pointer-events:none;}
.zen-mascot.is-twinkle .zen-twinkle{animation:zenTw .8s ease;}
@keyframes zenTw{0%{opacity:0;transform:scale(.3) rotate(0);}45%{opacity:1;transform:scale(1) rotate(22deg);}100%{opacity:0;transform:scale(.5) rotate(45deg);}}
@media (max-width:780px){.hero--zen{grid-template-columns:1fr;} .zen-mascot{order:-1; justify-content:flex-start;} .zen-mascot__inner{width:clamp(140px,38vw,200px);}}
@media (prefers-reduced-motion:reduce){.zen-eye i{transition:none;}}
</style>
</head>
<body>
  <div class="zen-bg" aria-hidden="true">
    <div class="zen-gridglow"></div>
    <div class="zen-grid"></div>
  </div>

  <header class="header">
    <div class="header__inner">
      <a class="header__left" href="#" id="brandLink" aria-label="Zenko — späť na úvod">
        <img class="header__brandimg" src="assets/brand/brandmark.svg" alt="" width="34" height="41" />
        <span class="header__identity">
          <span class="header__name"><img class="header__slash" src="assets/brand/zenko_slash.svg" alt="" />Zenko</span>
          <span class="header__meta">Grafika &amp; UI — brand discovery</span>

      </a>
      <span class="header__tag">AQUAPRIME</span>
    </div>

  <main>
    <div class="progress is-hidden" id="progress">
      <div class="progress__meta">
        <span id="progressLabel">Otázka 1</span>
        <span><b id="progressCur">0</b>&nbsp;/&nbsp;<span id="progressTot">0</span></span>
      </div>
      <div class="progress__bar"><div class="progress__fill" id="progressFill"></div></div>
    </div>

    <div id="screen"></div>
  </main>

  <footer class="page-footer">

  </footer>

  <div class="toast" id="toast"></div>

<script>
/* =========================================================
   AQUAPRIME — Brand Discovery (statická klikačka, GH Pages)
   Edituj len pole QUESTIONS nižšie. Žiadny build.
   ========================================================= */

// KAM sa odošlú odpovede e-mailom (mailto fallback). Zmeň podľa potreby:
const OWNER_EMAIL = "damnwern@gmail.com";

// PRIAME ODOSLANIE NA MAIL bez backendu (odporúčané):
//  1) choď na https://web3forms.com → zadaj svoj e-mail → príde ti "Access Key"

const WEB3FORMS_KEY = "a65f1646-1d88-4ab6-9cb7-38d1db275c45";

const SECTIONS = {
  base:   "01 — Základ",
  client: "02 — Zákazník",
  diff:   "03 — Odlíšenie",
  pers:   "04 — Osobnosť značky",
  visual: "05 — Vizuálny smer",
  logo:   "06 — Logo & formáty",
  prac:   "07 — Praktické",
};

const QUESTIONS = [
  // ---- 01 Základ ----
  { sec:"base", id:"oneliner", type:"textarea",
    q:"Ako jednou vetou opíšeš, čo AQUAPRIME ponúka?",
    help:"Predstav si, že to hovoríš človeku, ktorý vás vôbec nepozná.",
    ph:"Napr. Navrhujeme a vyrábame prémiové akvarijné skrinky na mieru…" },

  { sec:"base", id:"core", type:"multi",
    q:"Čo tvorí jadro ponuky?",
    help:"Vyber všetko podstatné. Prvé v poradí = najdôležitejšie.",
    options:["Akvarijné skrinky na mieru","Kompletné akvaristické zostavy","Údržba a servis","Poradenstvo / dizajn interiéru","Doplnky a technika"],
    other:true },

  { sec:"base", id:"price", type:"single",
    q:"V akej cenovej hladine sa pohybujete?",
    options:[
      {label:"Dostupná", desc:"cena je hlavný argument"},
      {label:"Stredná", desc:"rozumný pomer cena/kvalita"},
      {label:"Prémiová", desc:"kvalita a dizajn pred cenou"},
      {label:"Luxus na mieru", desc:"exkluzivita, bez kompromisu"},
    ]},

  // ---- 02 Zákazník ----
  { sec:"client", id:"persona", type:"textarea",
    q:"Kto je váš ideálny zákazník?",
    help:"Vek, životný štýl, prečo si to kupuje, ako sa rozhoduje.",
    ph:"Napr. 35–55 r., vlastné bývanie, cení si dizajn a pokoj doma…" },

  { sec:"client", id:"buyer", type:"single",
    q:"Kto kupuje najčastejšie?",
    options:[
      {label:"Domácnosť / byt", desc:"do obývačky, k stene"},
      {label:"Dizajnový interiér", desc:"architekti, náročný vkus"},
      {label:"Firma / priestor", desc:"recepcia, wellness, ordinácia"},
      {label:"Zberateľ / aquarista", desc:"rozumie technike, chce viac"},

/* ===================== STAV ===================== */
const answers = {};
const screen = document.getElementById("screen");
const progressEl = document.getElementById("progress");
const fillEl = document.getElementById("progressFill");
const curEl = document.getElementById("progressCur");
const totEl = document.getElementById("progressTot");
const labelEl = document.getElementById("progressLabel");
const toastEl = document.getElementById("toast");

// index: -1 = intro, 0..N-1 = otázky, N = summary
let idx = -1;
const N = QUESTIONS.length;
totEl.textContent = N;

document.getElementById("brandLink").addEventListener("click", (e)=>{e.preventDefault(); idx=-1; render();});

/* ===================== RENDER ===================== */
function render(){
  if(idx === -1){ renderIntro(); }
  else if(idx >= N){ renderSummary(); }
  else { renderQuestion(QUESTIONS[idx]); }
  window.scrollTo({top:0, behavior:"smooth"});
}

function renderIntro(){
  progressEl.classList.add("is-hidden");
  screen.innerHTML = `
    <section class="step fade-enter hero--zen">
      <div class="hero__copy">
        <p class="intro__sub">Pred tvorbou loga</p>
        <h1 class="intro__hero">AQUAPRIME</h1>
        <p class="intro__lead">Skôr než vznikne logo, potrebujem rozumieť značke. Tento dotazník nastaví smer, osobnosť a vizuál — aby logo nebolo náhoda, ale rozhodnutie.</p>
        <p class="intro__lead">Niet zlých odpovedí. Píš úprimne a stručne — z toho sa dá stavať.</p>
        <ul class="intro__facts">
          <li><b>${N}</b> otázok</li>
          <li><b>~8</b> minút</li>
          <li><b>0</b> registrácií</li>
          <li>odpovede ostávajú <b>u teba</b></li>
        </ul>
        <div class="nav">
          <button class="btn btn--gold" id="startBtn">Začať &rarr;</button>
          <span class="nav__hint">Enter pre štart</span>
        </div>
      </div>
      <div class="zen-mascot" id="zen-mascot" aria-hidden="true">
        <div class="zen-mascot__inner">
          <img class="zen-mascot__face" src="assets/brand/brandmark.svg" alt="" />
          <span class="zen-eye zen-eye--l"><i></i></span>
          <span class="zen-eye zen-eye--r"><i></i></span>
          <img class="zen-stache" src="assets/brand/mustache.svg" alt="" />
          <span class="zen-twinkle"></span>
        </div>
      </div>
    </section>`;
  document.getElementById("startBtn").addEventListener("click", next);
}

function renderQuestion(item){
  progressEl.classList.remove("is-hidden");
  const num = idx+1;
  curEl.textContent = num;
  fillEl.style.width = (num/N*100) + "%";
  labelEl.textContent = SECTIONS[item.sec] || "Otázka";

  let body = "";
  switch(item.type){
    case "text":     body = renderText(item, false); break;
    case "textarea": body = renderText(item, true); break;
    case "single":   body = renderSingle(item); break;
    case "multi":    body = renderMulti(item, "card"); break;
    case "chips":    body = renderMulti(item, "chip"); break;
    case "scale":    body = renderScale(item); break;
    case "contact":  body = renderContact(item); break;
  }

  const optional = item.optional ? `<span class="nav__hint">nepovinné</span>` : `<span class="nav__hint" id="navHint"></span>`;

  screen.innerHTML = `
    <section class="step fade-enter">
      <span class="step__eyebrow">${SECTIONS[item.sec]||""}</span>
      <h2 class="step__title">${item.q || (item.left + " ↔ " + item.right)}</h2>
      ${item.help ? `<p class="step__help">${item.help}</p>` : (item.type==="scale"?`<p class="step__help">Posuň jazdec tam, kam značka patrí.</p>`:"")}
      <div class="field">${body}</div>
      <div class="nav">
        <button class="btn btn--ghost" id="backBtn">&larr; Späť</button>
        <button class="btn btn--gold" id="nextBtn">${idx===N-1?"Hotovo &rarr;":"Ďalej &rarr;"}</button>
        ${optional}
      </div>
    </section>`;

  document.getElementById("backBtn").addEventListener("click", prev);
  document.getElementById("nextBtn").addEventListener("click", next);
  wireInputs(item);
}

/* ---- render: text/textarea ---- */
function renderText(item, multi){
  const val = answers[item.id] || "";
  const el = multi
    ? `<textarea id="inp" placeholder="${item.ph||""}">${escapeHtml(val)}</textarea>`
    : `<input type="text" id="inp" value="${escapeAttr(val)}" placeholder="${item.ph||""}" />`;
  return el;
}

/* ---- render: single ---- */
function renderSingle(item){
  const sel = answers[item.id];
  const opts = item.options.map((o,i)=>{
    const label = typeof o==="string"?o:o.label;
    const desc = typeof o==="string"?"":o.desc;
    const on = sel===label ? "is-selected":"";
    return `<button type="button" class="choice ${on}" data-val="${escapeAttr(label)}">
      <span class="choice__mark"></span>
      <span class="choice__body">
        <span class="choice__label"><span class="choice__num">${String(i+1).padStart(2,"0")}</span>${label}</span>
        ${desc?`<span class="choice__desc">${desc}</span>`:""}
      </span></button>`;
  }).join("");
  return `<div class="choices" data-kind="single">${opts}</div>`;
}

/* ---- render: multi (card alebo chip) ---- */
function renderMulti(item, mode){
  const sel = answers[item.id] || [];
  const otherVal = answers[item.id+"__other"] || "";
  let html;
  if(mode==="chip"){
    html = `<div class="chips" data-kind="multi">` + item.options.map(o=>{
      const on = sel.includes(o)?"is-selected":"";
      return `<button type="button" class="chip ${on}" data-val="${escapeAttr(o)}"><span class="chip__tick">✓</span>${o}</button>`;
    }).join("") + `</div>`;
  } else {
    html = `<div class="choices" data-kind="multi">` + item.options.map((o,i)=>{
      const on = sel.includes(o)?"is-selected":"";
      return `<button type="button" class="choice choice--multi ${on}" data-val="${escapeAttr(o)}">
        <span class="choice__mark"></span>
        <span class="choice__body"><span class="choice__label"><span class="choice__num">${String(i+1).padStart(2,"0")}</span>${o}</span></span>
      </button>`;
    }).join("") + `</div>`;
  }
  if(item.other){
    const shown = sel.includes("__other__") ? "is-shown":"";
    html += `<div class="other-field ${shown}" id="otherWrap">
      <input type="text" id="otherInp" value="${escapeAttr(otherVal)}" placeholder="Iné — napíš vlastné…" /></div>`;
  }
  return html;
}

/* ---- render: scale ---- */
function renderScale(item){
  const val = answers[item.id] || 4;
  return `
    <div class="scale">
      <div class="scale__ends">
        <span class="scale__end">${item.left}</span>
        <span class="scale__end scale__end--right">${item.right}</span>
      </div>
      <div class="scale__track">
        <input type="range" min="1" max="7" step="1" value="${val}" class="scale__range" id="inp" />
      </div>
      <div class="scale__ticks">${[1,2,3,4,5,6,7].map(n=>`<span>${n}</span>`).join("")}</div>
      <div class="scale__value" id="scaleVal">${scaleWord(val)}</div>
    </div>`;
}

/* ---- render: contact ---- */
function renderContact(item){
  const name = answers["contact_name"]||"";
  const mail = answers["contact_email"]||"";
  return `<div class="field--row">
    <input type="text" id="cName" value="${escapeAttr(name)}" placeholder="Meno" />
    <input type="text" id="cMail" value="${escapeAttr(mail)}" placeholder="E-mail" />
  </div>`;
}

/* ===================== WIRING ===================== */
function wireInputs(item){
  if(item.type==="text" || item.type==="textarea"){
    const inp = document.getElementById("inp");
    inp.focus();
    inp.addEventListener("input", ()=> answers[item.id]=inp.value.trim());
  }

  if(item.type==="single"){
    screen.querySelectorAll(".choice").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        answers[item.id]=btn.dataset.val;
        screen.querySelectorAll(".choice").forEach(b=>b.classList.remove("is-selected"));
        btn.classList.add("is-selected");
        setTimeout(next, 220); // auto-advance feeling klikačky
      });
    });
  }

  if(item.type==="multi" || item.type==="chips"){
    if(!answers[item.id]) answers[item.id]=[];
    const toggle = (val, btn)=>{
      const arr = answers[item.id];
      const i = arr.indexOf(val);
      if(i>=0){ arr.splice(i,1); btn.classList.remove("is-selected"); }
      else { arr.push(val); btn.classList.add("is-selected"); }
      // other field
      if(val==="__other__"){
        const w = document.getElementById("otherWrap");
        if(w){ w.classList.toggle("is-shown", arr.includes("__other__")); if(arr.includes("__other__")) document.getElementById("otherInp").focus(); }
      }
    };
    screen.querySelectorAll(".choice,.chip").forEach(btn=>{
      btn.addEventListener("click", ()=> toggle(btn.dataset.val, btn));
    });
    if(item.other){
      // pridaj „Iné“ tlačidlo na koniec
      const cont = screen.querySelector('[data-kind="multi"]');
      const isChip = cont.classList.contains("chips");
      const onSel = (answers[item.id]||[]).includes("__other__")?"is-selected":"";
      const otherBtn = document.createElement("button");
      otherBtn.type="button";
      otherBtn.className = (isChip?"chip ":"choice choice--multi ")+onSel;
      otherBtn.dataset.val="__other__";
      otherBtn.innerHTML = isChip
        ? `<span class="chip__tick">✓</span>Iné…`
        : `<span class="choice__mark"></span><span class="choice__body"><span class="choice__label">Iné…</span></span>`;
      otherBtn.addEventListener("click", ()=> toggle("__other__", otherBtn));
      cont.appendChild(otherBtn);
      const oi = document.getElementById("otherInp");
      if(oi) oi.addEventListener("input", ()=> answers[item.id+"__other"]=oi.value.trim());
    }
  }

  if(item.type==="scale"){
    const inp = document.getElementById("inp");
    answers[item.id] = parseInt(inp.value,10);
    const out = document.getElementById("scaleVal");
    inp.addEventListener("input", ()=>{
      answers[item.id]=parseInt(inp.value,10);
      out.textContent = scaleWord(inp.value);
    });
  }

  if(item.type==="contact"){
    const n=document.getElementById("cName"), m=document.getElementById("cMail");
    n.addEventListener("input", ()=>answers["contact_name"]=n.value.trim());
    m.addEventListener("input", ()=>answers["contact_email"]=m.value.trim());
  }
}

/* ===================== NAVIGÁCIA ===================== */
function next(){
  // jemná validácia: povinné textové polia
  if(idx>=0 && idx<N){
    const item = QUESTIONS[idx];
    if(!item.optional && (item.type==="text"||item.type==="textarea")){
      if(!answers[item.id]){ shake(); toast("Napíš krátku odpoveď 🙂"); return; }
    }
    if(!item.optional && (item.type==="multi"||item.type==="chips")){
      const arr=answers[item.id]||[];
      const real=arr.filter(v=>v!=="__other__").length + ((arr.includes("__other__")&&answers[item.id+"__other"])?1:0);
      if(real===0){ shake(); toast("Vyber aspoň jednu možnosť 🙂"); return; }
    }
  }
  idx++; render();
}
function prev(){ if(idx>-1){ idx--; render(); } }

document.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    const t=e.target.tagName;
    if(t==="TEXTAREA") return;      // v textarea Enter = nový riadok
    if(idx===-1){ next(); return; }
    if(t==="INPUT" || t==="BODY"){ next(); }
  }
});

/* ===================== SUMMARY ===================== */
function renderSummary(){
  progressEl.classList.add("is-hidden");
  let rows = "";
  let lastSec = "";
  QUESTIONS.forEach(item=>{
    if(item.sec!==lastSec){
      if(lastSec!=="") rows += `<div class="summary__divider"></div>`;
      lastSec = item.sec;
    }
    const a = formatAnswer(item);
    rows += `<div class="summary__group">
      <div class="summary__qlabel">${SECTIONS[item.sec]}</div>
      <div class="summary__q">${item.q || (item.left+" ↔ "+item.right)}</div>
      <div class="summary__a ${a?"":"is-empty"}">${a||"— bez odpovede —"}</div>
    </div>`;
  });

  screen.innerHTML = `
    <section class="step fade-enter">
      <span class="step__eyebrow">Hotovo</span>
      <h2 class="step__title">Zhrnutie odpovedí</h2>
      <p class="step__help">Skontroluj a pošli. Z týchto odpovedí postavíme smer značky a logo AQUAPRIME.</p>
      ${rows}
      <div class="actions">
        <button class="btn btn--gold" id="mailBtn">Odoslať e-mailom &rarr;</button>
        <button class="btn btn--outline" id="copyBtn">Kopírovať</button>
        <button class="btn btn--outline" id="txtBtn">Stiahnuť .txt</button>
        <button class="btn btn--ghost" id="editBtn">&larr; Upraviť</button>
      </div>
    </section>`;

  document.getElementById("editBtn").addEventListener("click", ()=>{idx=N-1; render();});
  document.getElementById("copyBtn").addEventListener("click", ()=>{
    navigator.clipboard.writeText(buildPlainText()).then(()=>toast("Skopírované do schránky ✓"));
  });
  document.getElementById("txtBtn").addEventListener("click", downloadTxt);
  document.getElementById("mailBtn").addEventListener("click", (e)=> submitForm(e.currentTarget));
}

/* odoslanie: web3forms (priamo na mail) ak je kľúč, inak mailto */
async function submitForm(btn){
  if(!WEB3FORMS_KEY){
    const subj = encodeURIComponent("AQUAPRIME — Brand Discovery odpovede");
    const body = encodeURIComponent(buildPlainText());
    window.location.href = `mailto:${OWNER_EMAIL}?subject=${subj}&body=${body}`;
    return;
  }
  const old = btn.innerHTML;
  btn.disabled = true; btn.innerHTML = "Odosielam…";
  try{
    const res = await fetch("https://api.web3forms.com/submit", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Accept":"application/json" },
      body: JSON.stringify({
        access_key: WEB3FORMS_KEY,
        subject: "AQUAPRIME — Brand Discovery odpovede",
        from_name: answers["contact_name"] || "AQUAPRIME dotazník",
        email: answers["contact_email"] || OWNER_EMAIL,
        message: buildPlainText()
      })
    });
    const j = await res.json();
    if(j.success){ btn.innerHTML = "Odoslané ✓"; toast("Odoslané na e-mail ✓"); }
    else throw new Error(j.message || "chyba");
  }catch(err){
    btn.disabled = false; btn.innerHTML = old;
    toast("Nepodarilo sa odoslať — použi „Kopírovať“");
  }
}

/* ===================== EXPORT / FORMÁTY ===================== */
function formatAnswer(item){
  if(item.type==="scale"){
    const v=answers[item.id]; return v?`${v}/7 — ${scaleWord(v)} (${item.left} ↔ ${item.right})`:"";
  }
  if(item.type==="contact"){
    const n=answers["contact_name"]||"", m=answers["contact_email"]||"";
    return (n||m)?`${n}${n&&m?" · ":""}${m}`:"";
  }
  if(item.type==="multi"||item.type==="chips"){
    const arr=(answers[item.id]||[]).slice();
    const other=answers[item.id+"__other"];
    const list=arr.filter(v=>v!=="__other__");
    if(arr.includes("__other__")&&other) list.push("Iné: "+other);
    return list.join(", ");
  }
  return answers[item.id]||"";
}

function buildPlainText(){
  let out="AQUAPRIME — BRAND DISCOVERY\n";
  out+="===========================\n\n";
  let lastSec="";
  QUESTIONS.forEach(item=>{
    if(item.sec!==lastSec){ out+=`\n— ${SECTIONS[item.sec]} —\n`; lastSec=item.sec; }
    const q=item.q || (item.left+" ↔ "+item.right);
    out+=`\n${q}\n${formatAnswer(item)||"(bez odpovede)"}\n`;
  });
  return out;
}

function downloadTxt(){
  const blob=new Blob([buildPlainText()],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="aquaprime-brand-discovery.txt";
  a.click(); URL.revokeObjectURL(url);
  toast("Stiahnuté ✓");
}

/* ===================== HELPERS ===================== */
function scaleWord(v){
  v=parseInt(v,10);
  return ["—","silno vľavo","vľavo","skôr vľavo","stred","skôr vpravo","vpravo","silno vpravo"][v]||"stred";
}
function escapeHtml(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function escapeAttr(s){return String(s).replace(/"/g,"&quot;").replace(/</g,"&lt;");}
let toastT;
function toast(msg){
  toastEl.textContent=msg; toastEl.classList.add("is-shown");
  clearTimeout(toastT); toastT=setTimeout(()=>toastEl.classList.remove("is-shown"),2200);
}
function shake(){
  const s=screen.querySelector(".step");
  if(!s) return;
  s.animate([{transform:"translateX(0)"},{transform:"translateX(-6px)"},{transform:"translateX(6px)"},{transform:"translateX(0)"}],{duration:260});
}

/* ===================== ZEN: grid + maskot ===================== */
function initZen(){
  const root = document.documentElement;
  // grid + glow + oči maskota sledujú kurzor
  window.addEventListener("pointermove", (e)=>{
    root.style.setProperty("--gx", e.clientX+"px");
    root.style.setProperty("--gy", e.clientY+"px");
    const inner = document.querySelector(".zen-mascot__inner");
    if(inner){
      const r = inner.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height*0.6;
      const dx = e.clientX - cx, dy = e.clientY - cy;
      const d = Math.hypot(dx,dy) || 1;
      const mag = Math.min(r.width*0.03, d/26);
      inner.style.setProperty("--ex", (dx/d*mag).toFixed(1)+"px");
      inner.style.setProperty("--ey", (dy/d*mag).toFixed(1)+"px");
    }
  }, {passive:true});

  // periodické žmurkanie
  setInterval(()=>{
    const m = document.querySelector(".zen-mascot");
    if(!m) return;
    m.classList.add("is-blink");
    setTimeout(()=>m.classList.remove("is-blink"), 140);
  }, 4200);

  // hover na maskota = fúzy + twinkle; hover na CTA = zvedavé oči
  document.addEventListener("pointerover", (e)=>{
    const inner = e.target.closest && e.target.closest(".zen-mascot__inner");
    if(inner){
      const m = inner.closest(".zen-mascot");
      m.classList.add("is-stache","is-twinkle");
      setTimeout(()=>m.classList.remove("is-stache","is-twinkle"), 1000);
    }
    const m2 = document.querySelector(".zen-mascot");
    if(m2 && e.target.closest && e.target.closest(".btn")) m2.classList.add("is-curious");
  });
  document.addEventListener("pointerout", (e)=>{
    const m2 = document.querySelector(".zen-mascot");
    if(m2 && e.target.closest && e.target.closest(".btn")) m2.classList.remove("is-curious");
  });
}

/* štart */
render();
initZen();
</script>
